name: Three Day Data Refresh

on:
  schedule:
    - cron: '0 0 */1 * *' 
  workflow_dispatch: 

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests
          pip install pandas requests python-dotenv

      - name: Run ETL Pipeline and Notify
        env:
          TOKEN: ${{ secrets.TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: |
          python download_deadlist.py
          python clean_deadlist.py

      - name: Commit and Push if data changed
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add csv/raw_death_full.csv
          git add csv/death_full_chinese_column.csv
          git add csv/death_full.csv
          git add last_count.txt
          git commit -m "Automated Data Update: $(date +'%Y-%m-%d')" || exit 0
          git push
